name: TRANSFERapk

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-web:
    name: Build & Lint React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Verify Types & Lint
        run: npm run lint

      - name: Build Web Production Bundle
        run: npm run build

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Set up local properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Locate and Rename APK
        run: |
          mkdir -p build-artifacts
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} build-artifacts/TRANSFERapk.apk \;
          echo "APK successfully compiled and renamed to TRANSFERapk.apk!"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: TRANSFERapk
          path: build-artifacts/TRANSFERapk.apk
          if-no-files-found: error
